name: Deploy to EC2

# main 브랜치에 push 될 때 자동 실행
on:
  push:
    branches:
      - main
      
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 체크아웃 (옵션: deploy.sh 자체를 최신으로 가져오기 위함)
      - name: Checkout repository
        uses: actions/checkout@v3

      # SSH를 통해 서버에서 deploy.sh 실행
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}       # EC2 퍼블릭 IP 또는 도메인
          username: ${{ secrets.EC2_USER }}   # 예: ubuntu
          key: ${{ secrets.EC2_KEY }}     # PEM 키
          port: ${{ secrets.EC2_PORT }}       # 예: 22
          script: |
            /home/ubuntu/deploy.sh